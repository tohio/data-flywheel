# Model registry — teacher and student candidates

teacher:
  provider: groq
  model: llama-3.3-70b-versatile
  role: judge_and_label        # Used for LLM-as-judge AND to label unlabeled logs

candidates:
  - id: llama-1b
    provider: groq
    model: llama-3.1-8b-instant        # Groq model name (used for inference)
    hf_model: meta-llama/Llama-3.2-1B  # HF Hub model ID (used for TRL training)
    experiments: [icl, lora_sft]
    target: low_cost

  - id: llama-3b
    provider: groq
    model: llama-3.1-8b-instant
    hf_model: meta-llama/Llama-3.2-3B
    experiments: [icl, lora_sft]
    target: balanced

  - id: llama-8b
    provider: groq
    model: llama-3.1-8b-instant
    hf_model: meta-llama/Llama-3.1-8B
    experiments: [icl, lora_sft]
    target: high_accuracy